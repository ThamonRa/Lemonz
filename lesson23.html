<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* MAIN NAVBAR */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    background:linear-gradient(90deg,#0ba47b,#2cc3ff);
}

/* LOGO */

.logo{
    color:#bfa9ff;
    font-size:32px;
    font-weight:bold;
}

.logo span{
    color:#6aa3ff;
    margin-left:10px;
}

/* MENU CONTAINER */

.menu{
    background:#3abded;
    padding:12px 30px;
    border-radius:40px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

/* MENU LINKS */

.menu a{
    color:#6a4bdb;
    text-decoration:none;
    margin:0 15px;
    font-size:18px;
    font-weight:600;
}

.menu a:hover{
    color:rgb(239, 236, 236);
}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">
Thamon Ra <span>✔</span>
</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Service</a>
<a href="#">Project</a>
<a href="#">Review</a>
<a href="#">Contact Us</a>
</div>

</div>

</body>
</html>
