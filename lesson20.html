<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook</title>
<link rel="shortcut icon" href="facebook.ico">

<style>

*{
    box-sizing: border-box;
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
}

body{
    background:black;
}

/* TOP NAVBAR */

.ctrlNav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:white;
    padding:10px 20px;
    border-bottom:1px solid #ddd;
}

.linkfb{
    text-decoration:none;
    font-size:26px;
    color:#1877f2;
    font-weight:bold;
}

/* RIGHT LOGIN AREA */

.rightside{
    display:flex;
    align-items:center;
    gap:10px;
}

.rightside input[type="text"],
.rightside input[type="password"]{
    padding:6px 8px;
    border:1px solid #ccc;
    border-radius:4px;
}

.rightside input[type="button"]{
    background:#1877f2;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:4px;
    cursor:pointer;
}

.rightside a{
    font-size:13px;
    text-decoration:none;
    color:#1877f2;
}

/* CENTER BOX */

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
}

.box{
    width:350px;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.box h3{
    margin-bottom:10px;
}

.box p{
    font-size:14px;
    margin-bottom:15px;
}

.box input{
    width:100%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:5px;
    margin-bottom:15px;
}
.box hr{
    border: none;
    border-top: 1px solid #ddd;
    margin: 15px -20px;   /* same as box padding */
}


.btns{
    display:flex;
    justify-content:flex-end;
    gap:10px;
}

.cancel{
    background:#e4e6eb;
    border:none;
    padding:6px 12px;
    border-radius:5px;
    margin-top: 10px;
}

.search{
    margin-top: 10px;
    background:#1877f2;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:5px;
}

</style>
</head>

<body>

<div class="ctrlNav">

<div class="leftside">
<a href="#" class="linkfb">Mybook</a>
</div>

<div class="rightside">
<input type="text" placeholder="Email">
<input type="password" placeholder="Password">
<input type="button" value="Log In">

</div>

</div>

<div class="container">

<div class="box">

<h3>Reset your password</h3>
<hr>
<p style="margin-top: 10px;">Please enter your email and new password.</p>
<input type="text" placeholder="Email or Phone number">
<input type="text" placeholder="New password">
<input type="text" placeholder="Confirm password">
<hr>
<div class="btns">
<button class="cancel">Cancel</button>
<button class="search">Search</button>
</div>

</div>

</div>

</body>
</html>
