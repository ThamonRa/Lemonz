<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudentLab</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:khmer os battambang;
}

/* PAGE BACKGROUND */

body{
    background:#eef1f6;
}

/* NAVBAR */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
}

.logo h2{
    font-size:20px;
}

.logo span{
    font-size:12px;
    color:#666;
}

.navlinks{
    display:flex;
    align-items:center;
    gap:25px;
}

.navlinks a{
    text-decoration:none;
    color:#333;
    font-size:14px;
}

.getbtn{
    background:#3b6eea;
    color:white;
    border:none;
    padding:8px 16px;
    border-radius:6px;
    cursor:pointer;
}

/* CENTER LOGIN AREA */

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:85vh;
}

/* LOGIN CARD */

.card{
    width:380px;
    background:#f5f5f5;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card h2{
    margin-bottom:8px;
}

.desc{
    font-size:14px;
    color:#555;
    margin-bottom:20px;
}

/* INPUTS */

label{
    font-size:13px;
    color:#555;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:6px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
}

/* REMEMBER + FORGOT */

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:13px;
    margin-bottom:15px;
}

.remember{
    display:flex;
    align-items:center;
    gap:6px;
    color:#666;
}

.remember input{
    width:auto;
    margin-top: 15px;
}

/* BUTTONS */

.buttons{
    display:flex;
    gap:10px;
}

.login{
    flex:1;
    background:#3b6eea;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.register{
    flex:1;
    background:#e4e6eb;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.create{
    text-align:center;
    font-size:13px;
    margin-top:15px;
    color:#666;
}

.create a{
    color:#3b6eea;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
<h2>StudentLab</h2>
<span>practice portal</span>
</div>

<div class="navlinks">
<a href="#">Home</a>
<a href="#">Courses</a>
<a href="#">Resources</a>
<button class="getbtn">Get Started</button>
</div>

</div>

<!-- LOGIN FORM -->

<div class="container">

<div class="card">

<h2>Sign in to StudentLab</h2>
<p class="desc">Use your student account to access practice tasks and lessons.</p>

<label>Email</label>
<input type="email" placeholder="nameynametv@school.edu">

<label>Password</label>
<input type="password" placeholder="••••••••">

<label>Role / Class</label>
<select>
<option>Student — Grade 11</option>
<option>Student — Beginner</option>
<option>Student — Advanced</option>
<option>Teacher / Instructor</option>
</select>

<div class="row">

<label class="remember">
Remember me
<input type="checkbox">
</label>

<a href="#">Forgot password?</a>

</div>

<div class="buttons">
<button class="login">Login</button>
<button class="register">Register</button>
</div>

<p class="create">
Don't have an account? <a href="#">Create one</a>
</p>

</div>

</div>

</body>
</html>
