<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Form</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

form{
    background:white;
    padding:30px;
    border-radius:12px;
    width:360px;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

h2{
    text-align:left;
    margin-bottom:20px;
}

label{
    font-weight:600;
    margin-top:12px;
    display:block;
}

input, select, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

textarea{
    resize:none;
    height:50px;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:18px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
    font-weight:600;
}

.submit-btn{
    background:#2563eb;
    color:white;
}

.submit-btn:hover{
    background:#1d4ed8;
}

.reset-btn{
    background:#1d4ed8;
    color: white;
}

</style>
</head>

<body>

<form>
  <h2>Contact form</h2>

  <label>Name:</label>
  <input type="text" placeholder="kom plex name..." required>

  <label>Email:</label>
  <input type="email" placeholder="Somvor dak email plz.." required>

  <label>Message:</label>
  <textarea placeholder="" required></textarea>
 <label>Country</label>
  <select required>
    <option value="">Select a Country</option>
    <option>Cambodia</option>
    <option>Thiefland</option>
    <option>USA</option>
    <option>Israel</option>
    <option>Iran</option>
  </select>
  <div class="buttons">
    <button type="submit" class="submit-btn">Submit</button>
    <button type="reset" class="reset-btn">Clear</button>
  </div>
</form>

</body>
</html>
